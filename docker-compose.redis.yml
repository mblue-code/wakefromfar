services:
  redis:
    image: redis:7-alpine
    container_name: wol-rate-limit-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  wol-backend:
    depends_on:
      - redis
    environment:
      RATE_LIMIT_BACKEND: redis
      RATE_LIMIT_REDIS_URL: ${RATE_LIMIT_REDIS_URL:-redis://127.0.0.1:6379/0}
