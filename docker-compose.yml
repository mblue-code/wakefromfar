services:
  wol-backend:
    build:
      context: ./backend
    container_name: wol-backend
    restart: unless-stopped
    network_mode: host
    environment:
      APP_SECRET: ${APP_SECRET:?APP_SECRET must be set in .env}
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASS: ${ADMIN_PASS:?ADMIN_PASS must be set in .env}
      DATA_DIR: /data
      DB_FILENAME: wol.db
      TOKEN_EXPIRES_SECONDS: ${TOKEN_EXPIRES_SECONDS:-0}
      ENFORCE_IP_ALLOWLIST: ${ENFORCE_IP_ALLOWLIST:-true}
      IP_ALLOWLIST_CIDRS: ${IP_ALLOWLIST_CIDRS:-100.64.0.0/10,fd7a:115c:a1e0::/48,127.0.0.1/32,::1/128}
      TRUST_PROXY_HEADERS: ${TRUST_PROXY_HEADERS:-false}
      TRUSTED_PROXY_CIDRS: ${TRUSTED_PROXY_CIDRS:-127.0.0.1/32,::1/128}
      LOGIN_RATE_LIMIT_PER_MINUTE: ${LOGIN_RATE_LIMIT_PER_MINUTE:-5}
      ONBOARDING_RATE_LIMIT_PER_MINUTE: ${ONBOARDING_RATE_LIMIT_PER_MINUTE:-5}
      WAKE_RATE_LIMIT_PER_MINUTE: ${WAKE_RATE_LIMIT_PER_MINUTE:-20}
      RATE_LIMIT_BACKEND: ${RATE_LIMIT_BACKEND:-redis}
      RATE_LIMIT_REDIS_URL: ${RATE_LIMIT_REDIS_URL:-redis://127.0.0.1:6379/0}
      WAKE_SEND_MAX_ATTEMPTS: ${WAKE_SEND_MAX_ATTEMPTS:-2}
      WAKE_SEND_BACKOFF_MS: ${WAKE_SEND_BACKOFF_MS:-150}
      POWER_CHECK_TIMEOUT_SECONDS: ${POWER_CHECK_TIMEOUT_SECONDS:-1.5}
      POWER_STATE_STALE_SECONDS: ${POWER_STATE_STALE_SECONDS:-20}
    volumes:
      - wol-data:/data
      - /etc/resolv.conf:/etc/resolv.conf:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=2).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  wol-data:
