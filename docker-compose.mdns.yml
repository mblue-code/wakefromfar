# Optional overlay: mount the host avahi-daemon socket so the backend can
# resolve mDNS (.local) hostnames during device discovery.
#
# Requires avahi-daemon to be running on the host:
#   sudo apt install avahi-daemon && sudo systemctl enable --now avahi-daemon
#
# Usage:
#   docker compose -f docker-compose.yml [-f docker-compose.prod.yml] -f docker-compose.mdns.yml up -d --build
services:
  wol-backend:
    volumes:
      - /var/run/avahi-daemon/socket:/var/run/avahi-daemon/socket:ro
